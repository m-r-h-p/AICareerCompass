version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-career-compass-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aicareer
      POSTGRES_PASSWORD: aicareer_dev_pass
      POSTGRES_DB: ai_career_compass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicareer"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai-career-compass-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aicareer.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # نکته: Ollama رو عمداً داخل داکر نمی‌ذاریم چون بهتره مستقیم روی سیستم خودت
  # نصب و اجرا بشه (ollama.com) تا از GPU سیستم هم استفاده کنه.
  # بعد از نصب، با آدرس http://localhost:11434 از داخل برنامه بهش وصل می‌شیم.

volumes:
  postgres_data: